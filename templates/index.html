<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion | Pro Vision</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .scanner-line {
            position: absolute;
            width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, #00f2ff, transparent);
            box-shadow: 0 0 15px #00f2ff;
            animation: scan 2s linear infinite;
            z-index: 10;
            display: none;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .btn-pro {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            position: relative; overflow: hidden; transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-pro:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
        }
        .btn-pro::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-pro:hover::after { left: 100%; }

        .tab-active {
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid #00f2ff;
            color: #00f2ff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        
        .hud-text { font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }

        #display-container {
            position: relative; border-radius: 16px; overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1), 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px]"></div>
    </div>

    <main class="relative z-10 w-full max-w-5xl p-6">
        <div class="glass-panel rounded-3xl p-8 md:p-10 flex flex-col md:flex-row gap-8 items-center md:items-start">
            
            <div class="flex-1 space-y-8 w-full">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        <span class="text-xs font-bold tracking-widest text-gray-400 uppercase">System Online</span>
                    </div>
                    <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-500 font-[Outfit]">
                        Emotion AI
                    </h1>
                    <p class="text-gray-400 mt-2 text-lg font-light">
                        Advanced Facial Expression Recognition System.
                    </p>
                </div>

                <div class="flex p-1 bg-black/40 rounded-xl backdrop-blur-md border border-white/5 w-fit">
                    <button onclick="setMode('live')" id="tab-live" class="tab-active px-6 py-2.5 rounded-lg text-sm font-bold transition-all flex items-center gap-2">
                        <i class="fa-solid fa-video"></i> Live Cam
                    </button>
                    <button onclick="setMode('upload')" id="tab-upload" class="px-6 py-2.5 rounded-lg text-gray-400 text-sm font-bold hover:text-white transition-all flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Upload
                    </button>
                </div>

                <div id="controls-live" class="space-y-4">
                    <button onclick="startCamera()" id="btn-start" class="btn-pro w-full py-4 rounded-xl text-white font-bold tracking-wider flex justify-center items-center gap-3 text-lg">
                        <i class="fa-solid fa-power-off"></i> INITIALIZE SYSTEM
                    </button>
                    <button onclick="captureFrame()" id="btn-capture" class="hidden w-full py-4 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold tracking-wider transition flex justify-center items-center gap-3">
                        <i class="fa-solid fa-camera"></i> CAPTURE FRAME
                    </button>
                </div>

                <div id="controls-upload" class="hidden w-full">
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-600 rounded-xl cursor-pointer hover:border-blue-500 hover:bg-white/5 transition group">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-500 group-hover:text-blue-400 mb-2 transition"></i>
                            <p class="text-sm text-gray-400"><span class="font-semibold text-white">Click to upload</span> or drag and drop</p>
                        </div>
                        <input type="file" id="file-input" class="hidden" accept="image/*" />
                    </label>
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/10">
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Detection Mode</p>
                        <p class="text-xl font-bold hud-text text-blue-400" id="mode-text">REAL-TIME</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 uppercase">Latency</p>
                        <p class="text-xl font-bold hud-text text-green-400" id="fps-meter">0 ms</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 w-full flex justify-center">
                <div id="display-container" class="w-[640px] h-[480px] bg-black relative group">
                    <img id="server-view" class="w-full h-full object-contain" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnZ5c3B5eWJ5eWJ5eWJ5eWJ5eWJ5eWJ5eWJ5eWJ5eWJ5eSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7bu3XilJ5BOiSGic/giphy.gif">
                    <div id="scanner" class="scanner-line"></div>
                    <div id="overlay-idle" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center backdrop-blur-sm transition-opacity duration-500">
                        <i class="fa-solid fa-fingerprint text-6xl text-white/20 mb-4"></i>
                        <p class="text-white/40 font-mono text-sm">WAITING FOR INPUT...</p>
                    </div>
                    
                    <div class="absolute top-4 left-4 w-4 h-4 border-t-2 border-l-2 border-blue-500/50"></div>
                    <div class="absolute top-4 right-4 w-4 h-4 border-t-2 border-r-2 border-blue-500/50"></div>
                    <div class="absolute bottom-4 left-4 w-4 h-4 border-b-2 border-l-2 border-blue-500/50"></div>
                    <div class="absolute bottom-4 right-4 w-4 h-4 border-b-2 border-r-2 border-blue-500/50"></div>
                </div>
            </div>
        </div>
    </main>

    <video id="raw-video" autoplay playsinline class="hidden"></video>
    <canvas id="hidden-canvas" width="640" height="480" class="hidden"></canvas>

    <script>
        const video = document.getElementById('raw-video');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        const serverView = document.getElementById('server-view');
        const scanner = document.getElementById('scanner');
        const overlay = document.getElementById('overlay-idle');
        const fpsMeter = document.getElementById('fps-meter');
        
        let isStreaming = false;

        function setMode(mode) {
            const btnLive = document.getElementById('tab-live');
            const btnUpload = document.getElementById('tab-upload');
            const controlsLive = document.getElementById('controls-live');
            const controlsUpload = document.getElementById('controls-upload');
            const modeText = document.getElementById('mode-text');

            if (mode === 'live') {
                btnLive.classList.add('tab-active', 'text-white');
                btnLive.classList.remove('text-gray-400');
                btnUpload.classList.remove('tab-active', 'text-white');
                btnUpload.classList.add('text-gray-400');
                
                controlsLive.classList.remove('hidden');
                controlsUpload.classList.add('hidden');
                modeText.innerText = "REAL-TIME";
                overlay.classList.remove('opacity-0');
            } else {
                btnUpload.classList.add('tab-active', 'text-white');
                btnUpload.classList.remove('text-gray-400');
                btnLive.classList.remove('tab-active', 'text-white');
                btnLive.classList.add('text-gray-400');

                controlsUpload.classList.remove('hidden');
                controlsLive.classList.add('hidden');
                modeText.innerText = "STATIC ANALYSIS";
                
                stopCamera();
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                isStreaming = true;

                document.getElementById('btn-start').classList.add('hidden');
                document.getElementById('btn-capture').classList.remove('hidden');
                scanner.style.display = 'block';
                overlay.classList.add('opacity-0'); 
                
                requestAnimationFrame(sendFrameLoop);
            } catch (err) { alert("Could not access camera: " + err); }
        }

        function stopCamera() {
            isStreaming = false;
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
            scanner.style.display = 'none';
        }

        async function sendFrameLoop() {
            if (!isStreaming) return;

            const startTime = performance.now();

            ctx.drawImage(video, 0, 0, 640, 480);
            
            // === التعديل هنا: جودة 0.3 للسرعة ===
            const base64 = canvas.toDataURL('image/jpeg', 0.3);

            try {
                const res = await fetch('/process_frame', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });
                const data = await res.json();
                
                if (data.image) {
                    serverView.src = data.image;
                }

                const duration = Math.round(performance.now() - startTime);
                fpsMeter.innerText = `${duration} ms`;

            } catch (err) { console.error(err); }

            if (isStreaming) requestAnimationFrame(sendFrameLoop);
        }

        function captureFrame() {
            isStreaming = false;
            scanner.style.display = 'none';
            alert("Frame Captured!");
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            overlay.classList.add('opacity-0');
            scanner.style.display = 'block'; 
            serverView.src = URL.createObjectURL(file); 

            const formData = new FormData();
            formData.append('file', file);

            try {
                const startTime = performance.now();
                const res = await fetch('/upload_image', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.image) {
                    serverView.src = data.image;
                    const duration = Math.round(performance.now() - startTime);
                    fpsMeter.innerText = `${duration} ms`;
                }
            } catch (err) {
                alert("Error processing image");
            } finally {
                scanner.style.display = 'none'; 
            }
        });
    </script>
</body>
</html>
